<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aqua Tsukimura | Developer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0f172a;
      --glass-bg: rgba(30, 41, 59, 0.7);
      --accent: #38bdf8; /* Soft blue accent */
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 60px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    section {
      margin-bottom: 50px;
    }

    h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .about p {
      font-size: 1.25rem;
      color: var(--text-dim);
      font-weight: 400;
      line-height: 1.8;
    }

    .about p strong {
      color: var(--text-main);
      font-weight: 600;
    }

    h3 {
      font-size: 1.5rem;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .icons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 15px;
    }

    .icon-link {
      aspect-ratio: 1/1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .icon-link:hover {
      background: rgba(56, 189, 248, 0.1);
      border-color: var(--accent);
      transform: translateY(-5px);
    }

    .icon-link img {
      width: 28px;
      height: 28px;
      filter: grayscale(0.2);
      transition: filter 0.3s;
    }

    .icon-link:hover img {
      filter: grayscale(0);
    }

    @media (max-width: 600px) {
      .container { padding: 30px; }
      header h1 { font-size: 2.5rem; }
      .icons-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<main class="container">
  <header>
    <h1>Aqua Tsukimura</h1>
  </header>

  <section class="about">
    <h2>Profile</h2>
    <p>
      I am a <strong>Full-Stack Developer</strong> and anime enthusiast. <br>
      At 14, I'm focused on building scalable systems and exploring modern cloud architectures.
    </p>
  </section>

  <section class="languages-tools">
    <h3>Tech Stack</h3>
    <div class="icons-grid">
      <a class="icon-link" href="#" aria-label="Azure"><img src="https://skillicons.dev/icons?i=azure" alt="Azure" /></a>
      <a class="icon-link" href="#" aria-label="C"><img src="https://skillicons.dev/icons?i=c" alt="C" /></a>
      <a class="icon-link" href="#" aria-label="C#"><img src="https://skillicons.dev/icons?i=cs" alt="C#" /></a>
      <a class="icon-link" href="#" aria-label="C++"><img src="https://skillicons.dev/icons?i=cpp" alt="C++" /></a>
      <a class="icon-link" href="#" aria-label="Cloudflare"><img src="https://skillicons.dev/icons?i=cloudflare" alt="Cloudflare" /></a>
      <a class="icon-link" href="#" aria-label="Kafka"><img src="https://skillicons.dev/icons?i=kafka" alt="Kafka" /></a>
      <a class="icon-link" href="#" aria-label="Kotlin"><img src="https://skillicons.dev/icons?i=kotlin" alt="Kotlin" /></a>
      <a class="icon-link" href="#" aria-label="Kubernetes"><img src="https://skillicons.dev/icons?i=kubernetes" alt="Kubernetes" /></a>
      <a class="icon-link" href="#" aria-label="Lua"><img src="https://skillicons.dev/icons?i=lua" alt="Lua" /></a>
      <a class="icon-link" href="#" aria-label="Python"><img src="https://skillicons.dev/icons?i=py" alt="Python" /></a>
      <a class="icon-link" href="#" aria-label="Redis"><img src="https://skillicons.dev/icons?i=redis" alt="Redis" /></a>
      <a class="icon-link" href="#" aria-label="TypeScript"><img src="https://skillicons.dev/icons?i=ts" alt="TypeScript" /></a>
      <a class="icon-link" href="#" aria-label="VSCode"><img src="https://skillicons.dev/icons?i=vscode" alt="VSCode" /></a>
    </div>
  </section>
</main>

</body>
</html>
